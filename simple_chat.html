<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙掌柜智能运营助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .header-info h1 {
            font-size: 1.2em;
            margin-bottom: 3px;
        }
        .header-info p {
            font-size: 0.85em;
            opacity: 0.9;
        }
        .status {
            margin-left: auto;
            background: rgba(76, 175, 80, 0.9);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }
        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.bot .message-avatar {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.bot .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .message-time {
            font-size: 0.75em;
            color: #999;
            margin-top: 5px;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        .input-field {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            border-color: #667eea;
        }
        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.3s;
        }
        .send-btn:hover {
            transform: scale(1.1);
        }
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .typing {
            display: none;
            padding: 10px 15px;
            background: white;
            border-radius: 18px;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        .typing.active {
            display: flex;
            gap: 5px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 100% { transform: scale(0); }
            50% { transform: scale(1); }
        }
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .welcome-message h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .suggestion-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .suggestion-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <h1>龙掌柜智能运营助手</h1>
                <p>专业的跨境电商AI运营专家</p>
            </div>
            <div class="status">● 在线</div>
        </div>

        <div class="messages" id="messages">
            <div class="welcome-message" id="welcome">
                <h2>👋 你好！我是龙掌柜智能运营助手</h2>
                <p>我可以帮你解决跨境电商运营中的各种问题</p>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="sendMessage('帮我分析3C电子市场')">📊 市场分析</button>
                    <button class="suggestion-btn" onclick="sendMessage('帮我选3个潜力产品')">🎯 智能选品</button>
                    <button class="suggestion-btn" onclick="sendMessage('帮我优化Listing')">📝 Listing优化</button>
                    <button class="suggestion-btn" onclick="sendMessage('帮我计算定价')">💰 智能定价</button>
                </div>
            </div>
        </div>

        <div class="typing" id="typing">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" class="input-field" id="input" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)" oninput="checkInput()">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
            </div>
        </div>
    </div>

    <script>
        // API配置
        const API_URL = 'https://longzhangguai-backend.loca.lt/api/v1/chat/message';
        let sessionId = 'session_' + Date.now();
        let isFirstMessage = true;

        // 模拟回复（当API不可用时）
        const mockResponses = {
            '选品': '📊 **智能选品建议**\n\n基于当前市场趋势，我推荐以下3个有潜力的产品：\n\n1. **智能穿戴设备** - 增长率35%，市场需求旺盛\n2. **露营装备** - 户外活动流行，轻量化产品受欢迎\n3. **智能家居配件** - 远程办公带动需求增长\n\n建议优先关注智能穿戴设备类目！',
            '分析': '📈 **市场深度分析**\n\n3C电子市场当前趋势：\n- 需求增长：25%持续上涨\n- 竞争程度：中等\n- 热门产品：无线耳机、智能手表、移动电源\n\n运营建议：优化Listing关键词，突出产品特色，提升主图质量。',
            '定价': '💰 **智能定价分析**\n\n根据成本结构，我为您提供以下定价方案：\n\n- 保本价：¥68.50\n- 保守定价（10%利润）：¥75.35\n- 平衡定价（20%利润）：¥82.20\n- 激进定价（30%利润）：¥89.05\n\n建议采用平衡定价，既能保证利润又有竞争力！',
            'listing': '✍️ **Listing优化建议**\n\n我已为您生成了优化的Listing内容：\n\n**标题**：精选高品质产品 正品保证 全国包邮\n\n**五点描述**：\n1. ✨ 优质材质，耐用性强\n2. 🎯 精工细作，品质保证\n3. 💯 正品保障，假一赔十\n4. 🚀 快速发货，48小时内\n5. 🛡️ 售后无忧，一年质保\n\n**详细描述**已生成，包含产品特点、优势、使用说明等。',
            'default': '好的！让我来帮您分析...\n\n根据您的需求，我已经完成了以下工作：\n\n✅ 分析市场趋势\n✅ 识别机会点\n✅ 提供专业建议\n\n您想了解哪个方面的详细信息？'
        };

        function checkInput() {
            const input = document.getElementById('input');
            const btn = document.getElementById('sendBtn');
            btn.disabled = input.value.trim() === '';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage(text) {
            const input = document.getElementById('input');
            const message = text || input.value.trim();
            
            if (!message) return;

            // 隐藏欢迎界面
            document.getElementById('welcome').style.display = 'none';

            // 添加用户消息
            addMessage('user', message);
            input.value = '';
            checkInput();

            // 显示输入状态
            document.getElementById('typing').classList.add('active');

            // 调用API，设置60秒超时
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, session_id: sessionId }),
                signal: controller.signal
            })
            .then(res => {
                clearTimeout(timeoutId);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }
                return res.json();
            })
            .then(data => {
                if (!data.message) {
                    throw new Error('返回数据格式错误');
                }
                addMessage('bot', data.message);
            })
            .catch(err => {
                console.error('API调用失败:', err);
                // 使用模拟回复
                let reply = mockResponses.default;
                if (message.includes('选品') || message.includes('产品')) {
                    reply = mockResponses['选品'];
                } else if (message.includes('分析') || message.includes('市场')) {
                    reply = mockResponses['分析'];
                } else if (message.includes('定价') || message.includes('价格') || message.includes('利润')) {
                    reply = mockResponses['定价'];
                } else if (message.includes('Listing') || message.includes('标题') || message.includes('描述')) {
                    reply = mockResponses['listing'];
                }
                setTimeout(() => addMessage('bot', reply), 500);
            })
            .finally(() => {
                document.getElementById('typing').classList.remove('active');
            });
        }

        function addMessage(role, content) {
            const messages = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const avatar = role === 'user' ? '👤' : '🤖';
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            // 简单的Markdown处理
            content = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            
            msgDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-text">${content}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
