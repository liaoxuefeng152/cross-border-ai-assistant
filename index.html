<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙掌柜智能运营助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .header-info h1 { font-size: 1.2em; margin-bottom: 3px; }
        .header-info p { font-size: 0.85em; opacity: 0.9; }
        .status {
            margin-left: auto;
            background: rgba(76, 175, 80, 0.9);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }
        .message { margin-bottom: 15px; display: flex; gap: 10px; }
        .message.user { flex-direction: row-reverse; }
        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }
        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.bot .message-avatar {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.bot .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .message-time {
            font-size: 0.75em;
            color: #999;
            margin-top: 5px;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        .input-field {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
        }
        .input-field:focus { border-color: #667eea; }
        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .send-btn:hover { transform: scale(1.1); }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .upload-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.2s;
        }
        .upload-btn:hover { transform: scale(1.1); }
        .typing {
            display: none;
            padding: 10px 15px;
            background: white;
            border-radius: 18px;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        .typing.active { display: flex; gap: 5px; }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: scale(0); }
            50% { transform: scale(1); }
        }
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .welcome-message h2 { color: #333; margin-bottom: 10px; }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .suggestion-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .suggestion-btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <h1>龙掌柜智能运营助手</h1>
                <p>专业的跨境电商AI运营专家</p>
            </div>
            <div class="status">● 在线</div>
        </div>

        <div class="messages" id="messages">
            <div class="welcome-message" id="welcome">
                <h2>👋 你好！我是龙掌柜智能运营助手</h2>
                <p>我可以帮你解决跨境电商运营中的各种问题</p>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="sendMessage('帮我分析3C电子市场')">📊 市场分析</button>
                    <button class="suggestion-btn" onclick="sendMessage('帮我选3个潜力产品')">🎯 智能选品</button>
                    <button class="suggestion-btn" onclick="sendMessage('帮我优化Listing')">📝 Listing优化</button>
                    <button class="suggestion-btn" onclick="sendMessage('帮我计算定价')">💰 智能定价</button>
                </div>
            </div>
        </div>

        <div class="typing" id="typing">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="file" id="fileInput" style="display: none;" accept="image/*,.txt,.csv,.json,.md" onchange="handleFileUpload(event)">
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()" title="上传文件或图片">📎</button>
                <input type="text" class="input-field" id="input" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendMessage()" oninput="document.getElementById('sendBtn').disabled=this.value.trim()===''">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
            </div>
            <div id="filePreview" style="display: none; margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 10px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span id="fileIcon">📄</span>
                    <span id="fileName" style="flex: 1; font-size: 0.9em;"></span>
                    <button onclick="clearFile()" style="background: none; border: none; cursor: pointer; font-size: 1.2em;">✕</button>
                </div>
                <img id="imagePreview" style="max-width: 100%; max-height: 200px; margin-top: 10px; display: none; border-radius: 8px;">
                <p id="fileContentPreview" style="font-size: 0.8em; color: #666; margin-top: 5px; white-space: pre-wrap; overflow: hidden; max-height: 100px; display: none;"></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/v1/chat/message';
        let sessionId = 'session_' + Date.now();
        let uploadedFile = null;

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            uploadedFile = file;
            const filePreview = document.getElementById('filePreview');
            const fileName = document.getElementById('fileName');
            const fileIcon = document.getElementById('fileIcon');
            const imagePreview = document.getElementById('imagePreview');
            const fileContentPreview = document.getElementById('fileContentPreview');

            fileName.textContent = file.name;
            filePreview.style.display = 'block';

            // 检查是否是图片
            if (file.type.startsWith('image/')) {
                fileIcon.textContent = '🖼️';
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    fileContentPreview.style.display = 'none';
                };
                reader.readAsDataURL(file);
            } else {
                fileIcon.textContent = '📄';
                imagePreview.style.display = 'none';
                const reader = new FileReader();
                reader.onload = function(e) {
                    fileContentPreview.textContent = e.target.result;
                    fileContentPreview.style.display = 'block';
                };
                reader.readAsText(file);
            }

            document.getElementById('sendBtn').disabled = false;
        }

        function clearFile() {
            uploadedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('fileContentPreview').style.display = 'none';
            document.getElementById('sendBtn').disabled = document.getElementById('input').value.trim() === '';
        }

        function sendMessage(text) {
            const input = document.getElementById('input');
            const message = text || input.value.trim();
            if (!message && !uploadedFile) return;

            document.getElementById('welcome').style.display = 'none';
            addMessage('user', message, uploadedFile);
            input.value = '';

            // 准备发送的数据
            const requestData = {
                message: message || "请帮我分析这个文件",
                session_id: sessionId
            };

            // 如果有图片文件，转换为base64
            if (uploadedFile && uploadedFile.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    requestData.image = e.target.result;
                    sendRequest(requestData);
                };
                reader.readAsDataURL(uploadedFile);
            }
            // 如果有文本文件，读取内容
            else if (uploadedFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    requestData.message = `${message}\n\n【文件内容】\n${e.target.result}`;
                    sendRequest(requestData);
                };
                reader.readAsText(uploadedFile);
            }
            else {
                sendRequest(requestData);
            }

            clearFile();
        }

        function sendRequest(requestData) {
            document.getElementById('typing').classList.add('active');

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            })
            .then(res => {
                console.log('状态码:', res.status);
                console.log('响应头:', Object.fromEntries(res.headers.entries()));
                return res.text();
            })
            .then(text => {
                console.log('响应内容:', text);
                try {
                    const data = JSON.parse(text);
                    if (data.message) {
                        addMessage('bot', data.message);
                    } else {
                        addMessage('bot', '返回数据格式错误');
                    }
                } catch (e) {
                    console.error('JSON解析失败:', e);
                    addMessage('bot', '解析错误: ' + text.substring(0, 100));
                }
            })
            .catch(err => {
                console.error('请求失败:', err);
                addMessage('bot', '请求失败: ' + err.message);
            })
            .finally(() => {
                document.getElementById('typing').classList.remove('active');
            });
        }

        function addMessage(role, content, file = null) {
            const messages = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            // 创建消息结构
            msgDiv.innerHTML = `<div class="message-avatar">${avatar}</div><div class="message-content"></div>`;
            messages.appendChild(msgDiv);

            const contentDiv = msgDiv.querySelector('.message-content');
            let contentHtml = '';

            // 添加时间戳
            contentHtml += `<div class="message-time">${time}</div>`;

            // 添加图片预览（异步）
            if (file && file.type && file.type.startsWith('image/')) {
                contentHtml += `<div class="message-image"><img src="" style="max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 10px;"></div>`;
                if (content) {
                    contentHtml += `<div class="message-text">${formatContent(content)}</div>`;
                }
                contentDiv.innerHTML = contentHtml;

                // 异步加载图片
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = contentDiv.querySelector('.message-image img');
                    if (img) {
                        img.src = e.target.result;
                    }
                };
                reader.readAsDataURL(file);
            }
            // 添加文件信息
            else if (file) {
                contentHtml += `<div class="message-file">📎 ${file.name}</div>`;
                if (content) {
                    contentHtml += `<div class="message-text">${formatContent(content)}</div>`;
                }
                contentDiv.innerHTML = contentHtml;
            }
            // 纯文本消息
            else {
                contentHtml += `<div class="message-text">${formatContent(content)}</div>`;
                contentDiv.innerHTML = contentHtml;
            }

            messages.scrollTop = messages.scrollHeight;
        }

        function formatContent(content) {
            return content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
